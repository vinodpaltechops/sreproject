# ──────────────────────────────────────────────────────────────────────────────
# Gateway + HTTPRoutes — AWS ALB via Gateway API (HTTP only)
#
# Argo Rollouts canary integration:
#   The Rollouts controller dynamically updates weights on the `trade-routes`
#   HTTPRoute (stable/canary backends) at each canary step.
#
# Blue-Green integration:
#   `trade-routes-bg` routes all traffic to active service.
#   Argo Rollouts switches the active service selector on promotion.
#
# Requires:
#   - AWS Load Balancer Controller v2.7+ with --enable-gateway-api=true
#   - Argo Rollouts Gateway API plugin installed
#   - CRDs: kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.1.0/standard-install.yaml
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: sre-gateway
  namespace: trade-app
spec:
  gatewayClassName: nginx        # was: aws-alb
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same             # or All / Selector, as needed

---
# ──────────────────────────────────────────────────────────────────────────────
# Canary HTTPRoute — Argo Rollouts updates stable/canary weights at each step
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: trade-routes
  namespace: trade-app
spec:
  parentRefs:
    - name: sre-gateway
      sectionName: http
  rules:

    # Note: Gateway API RequestRedirect only supports 301/302.
    # Chaos endpoints (/api/trades/simulate) and sensitive actuator endpoints
    # (/actuator/prometheus, /env, /loggers, /metrics) are blocked via
    # Spring Security + management.endpoints.web.exposure in application.yml,
    # not at the Gateway layer. ServiceMonitor scrapes /actuator/prometheus
    # cluster-internally, not through the ALB.

    # ── Health check (ALB target group probes) ─────────────────────────────────
    - matches:
        - path:
            type: PathPrefix
            value: /actuator/health
      backendRefs:
        - name: trade-service-stable
          port: 8080

    # ── Trade API — weighted canary split (Rollouts manages these weights) ──────
    - matches:
        - path:
            type: PathPrefix
            value: /api/trades
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            add:
              - name: X-Forwarded-By
                value: sre-gateway
      backendRefs:
        - name: trade-service-stable
          port: 8080
          weight: 100
        - name: trade-service-canary
          port: 8080
          weight: 0

---
# ──────────────────────────────────────────────────────────────────────────────
# Blue-Green HTTPRoute — all traffic to active service
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: trade-routes-bg
  namespace: trade-app
spec:
  parentRefs:
    - name: sre-gateway
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/trades
          headers:
            - name: X-Strategy
              value: bluegreen
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            add:
              - name: X-Forwarded-By
                value: sre-gateway
      backendRefs:
        - name: trade-service-active
          port: 8080

    # Preview route — accessible only with header for QA/smoke testing
    - matches:
        - path:
            type: PathPrefix
            value: /api/trades
          headers:
            - name: X-Preview
              value: "true"
      backendRefs:
        - name: trade-service-preview
          port: 8080
