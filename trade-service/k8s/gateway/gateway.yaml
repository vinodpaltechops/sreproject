# ──────────────────────────────────────────────────────────────────────────────
# Gateway + HTTPRoutes — AWS ALB via Gateway API
#
# Argo Rollouts canary integration:
#   The Rollouts controller dynamically updates weights on the `trade-routes`
#   HTTPRoute (stable/canary backends) at each canary step.
#
# Blue-Green integration:
#   `trade-routes-bg` routes all traffic to active service.
#   Argo Rollouts switches the active service selector on promotion.
#
# Requires:
#   - AWS Load Balancer Controller v2.7+ with --enable-gateway-api=true
#   - Argo Rollouts Gateway API plugin installed
#   - CRDs: kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.1.0/standard-install.yaml
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: sre-gateway
  namespace: trade-app
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: "${CERTIFICATE_ARN}"
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=60
spec:
  gatewayClassName: aws-alb
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            group: ""
            name: tls-secret
      allowedRoutes:
        namespaces:
          from: Same

---
# HTTP → HTTPS redirect
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-redirect
  namespace: trade-app
spec:
  parentRefs:
    - name: sre-gateway
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---
# ──────────────────────────────────────────────────────────────────────────────
# Canary HTTPRoute — Argo Rollouts updates stable/canary weights at each step
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: trade-routes
  namespace: trade-app
spec:
  parentRefs:
    - name: sre-gateway
      sectionName: https
  rules:

    # ── Block chaos endpoints from external traffic ────────────────────────────
    - matches:
        - path:
            type: PathPrefix
            value: /api/trades/simulate
      filters:
        - type: RequestRedirect
          requestRedirect:
            statusCode: 403

    # ── Block sensitive actuator endpoints ─────────────────────────────────────
    - matches:
        - path:
            type: PathPrefix
            value: /actuator/prometheus
        - path:
            type: PathPrefix
            value: /actuator/env
        - path:
            type: PathPrefix
            value: /actuator/loggers
        - path:
            type: PathPrefix
            value: /actuator/metrics
      filters:
        - type: RequestRedirect
          requestRedirect:
            statusCode: 403

    # ── Health check (ALB target group probes) ─────────────────────────────────
    - matches:
        - path:
            type: PathPrefix
            value: /actuator/health
      backendRefs:
        - name: trade-service-stable
          port: 8080

    # ── Trade API — weighted canary split (Rollouts manages these weights) ──────
    - matches:
        - path:
            type: PathPrefix
            value: /api/trades
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            add:
              - name: X-Forwarded-By
                value: sre-gateway
      backendRefs:
        - name: trade-service-stable
          port: 8080
          weight: 100   # Argo Rollouts sets this to (100 - canary%) at each step
        - name: trade-service-canary
          port: 8080
          weight: 0     # Argo Rollouts sets this to canary% at each step

---
# ──────────────────────────────────────────────────────────────────────────────
# Blue-Green HTTPRoute — all traffic to active service
# Argo Rollouts switches active service selector on promotion, no route change needed
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: trade-routes-bg
  namespace: trade-app
spec:
  parentRefs:
    - name: sre-gateway
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/trades
          headers:
            - name: X-Strategy
              value: bluegreen
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            add:
              - name: X-Forwarded-By
                value: sre-gateway
      backendRefs:
        - name: trade-service-active
          port: 8080

    # Preview route — accessible only with header for QA/smoke testing
    - matches:
        - path:
            type: PathPrefix
            value: /api/trades
          headers:
            - name: X-Preview
              value: "true"
      backendRefs:
        - name: trade-service-preview
          port: 8080
