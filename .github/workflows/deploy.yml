name: CI/CD — Build and Deploy to EKS

on:
  push:
    branches: [main]
    paths:
      - 'trade-service/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 748624205055.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: trade-service
  EKS_CLUSTER: sre-lab
  K8S_NAMESPACE: trade-app

# ──────────────────────────────────────────────────────────────────────────────
# Job 1 — Test
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trade-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw test --no-transfer-progress

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: trade-service/target/surefire-reports/

# ──────────────────────────────────────────────────────────────────────────────
# Job 2 — Build & Push to ECR
# ──────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_uri: ${{ steps.meta.outputs.uri }}
    defaults:
      run:
        working-directory: trade-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          TAG=${{ github.sha }}
          URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$TAG
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "uri=$URI"  >> $GITHUB_OUTPUT

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-scanning-configuration scanOnPush=true \
            --region ${{ env.AWS_REGION }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.uri }} \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest \
            .

      - name: Push to ECR
        run: |
          docker push ${{ steps.meta.outputs.uri }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Scan image for vulnerabilities
        run: |
          aws ecr wait image-scan-complete \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-id imageTag=${{ steps.meta.outputs.tag }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws ecr describe-image-scan-findings \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-id imageTag=${{ steps.meta.outputs.tag }} \
            --region ${{ env.AWS_REGION }} \
            --query 'imageScanFindings.findingSeverityCounts' || true

# ──────────────────────────────────────────────────────────────────────────────
# Job 3 — Deploy to EKS
# ──────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      # ── Install Gateway API CRDs (idempotent) ───────────────────────────────
      - name: Install Gateway API CRDs
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.1.0/standard-install.yaml

      # ── Namespace ───────────────────────────────────────────────────────────
      - name: Apply namespace
        run: kubectl apply -f trade-service/k8s/namespace.yaml

      # ── ServiceAccount ──────────────────────────────────────────────────────
      - name: Apply ServiceAccount
        run: kubectl apply -f trade-service/k8s/serviceaccount.yaml

      # ── NetworkPolicy ───────────────────────────────────────────────────────
      - name: Apply NetworkPolicy
        run: kubectl apply -f trade-service/k8s/network-policy.yaml

      # ── Deployment + Service (substitute real image tag) ────────────────────
      - name: Deploy application
        run: |
          sed "s|IMAGE_TAG|${{ needs.build.outputs.image_tag }}|g" \
            trade-service/k8s/deployment.yaml | kubectl apply -f -

      # ── Gateway API — substitute ACM certificate ARN ────────────────────────
      - name: Apply Gateway and HTTPRoutes
        env:
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}
        run: |
          sed "s|\${CERTIFICATE_ARN}|$CERTIFICATE_ARN|g" \
            trade-service/k8s/gateway.yaml | kubectl apply -f -

      # ── Wait for rollout ─────────────────────────────────────────────────────
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/trade-service \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=180s

      # ── Print deployment summary ─────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o wide
          echo ""
          echo "=== Services ==="
          kubectl get svc -n ${{ env.K8S_NAMESPACE }}
          echo ""
          echo "=== Gateway ==="
          kubectl get gateway,httproute -n ${{ env.K8S_NAMESPACE }}
          echo ""
          echo "=== ALB address ==="
          kubectl get gateway sre-gateway \
            -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.status.addresses[0].value}' 2>/dev/null && echo ""
