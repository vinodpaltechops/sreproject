name: CI/CD — Build, Push and GitOps Deploy

on:
  push:
    branches: [main]
    paths:
      - 'trade-service/src/**'
      - 'trade-service/pom.xml'
      - 'trade-service/Dockerfile'
  workflow_dispatch:
    inputs:
      strategy:
        description: 'Rollout strategy'
        required: true
        default: 'canary'
        type: choice
        options:
          - canary
          - bluegreen

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 748624205055.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: trade-service

# ──────────────────────────────────────────────────────────────────────────────
# Job 1 — Test
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trade-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw test --no-transfer-progress

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: trade-service/target/surefire-reports/

# ──────────────────────────────────────────────────────────────────────────────
# Job 2 — Build and push to ECR
# ──────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    defaults:
      run:
        working-directory: trade-service
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-scanning-configuration scanOnPush=true \
            --region ${{ env.AWS_REGION }}

      - name: Build and push
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          TAG=${{ steps.meta.outputs.tag }}
          docker build -t $IMAGE:$TAG -t $IMAGE:latest .
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest

      - name: ECR vulnerability scan
        run: |
          aws ecr wait image-scan-complete \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-id imageTag=${{ steps.meta.outputs.tag }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true
          CRITICAL=$(aws ecr describe-image-scan-findings \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-id imageTag=${{ steps.meta.outputs.tag }} \
            --region ${{ env.AWS_REGION }} \
            --query 'imageScanFindings.findingSeverityCounts.CRITICAL' \
            --output text 2>/dev/null || echo "0")
          echo "Critical CVEs: $CRITICAL"
          if [ "$CRITICAL" -gt "0" ]; then
            echo "::warning::Image has $CRITICAL critical CVEs"
          fi

# ──────────────────────────────────────────────────────────────────────────────
# Job 3 — GitOps: update image tag in manifests and commit
#          ArgoCD detects the change and triggers Argo Rollouts delivery
# ──────────────────────────────────────────────────────────────────────────────
  gitops-update:
    name: GitOps — Update Image Tag
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine rollout strategy
        id: strategy
        run: |
          STRATEGY=${{ github.event.inputs.strategy || 'canary' }}
          echo "strategy=$STRATEGY" >> $GITHUB_OUTPUT
          echo "Using strategy: $STRATEGY"

      - name: Update image tag in Rollout manifests
        run: |
          TAG=${{ needs.build.outputs.image_tag }}
          STRATEGY=${{ steps.strategy.outputs.strategy }}

          # Update the active rollout manifest
          if [ "$STRATEGY" = "canary" ]; then
            MANIFEST="trade-service/k8s/rollouts/canary.yaml"
          else
            MANIFEST="trade-service/k8s/rollouts/bluegreen.yaml"
          fi

          # Replace the current tag (whatever it is: IMAGE_TAG placeholder or a prior SHA)
          # with the new git SHA. Matches trade-service: followed by one token.
          sed -i -E "s|(trade-service:)[A-Za-z0-9_.-]+|\1${TAG}|g" $MANIFEST

          echo "Updated $MANIFEST → image tag: $TAG"

      - name: Commit and push updated manifest
        run: |
          TAG=${{ needs.build.outputs.image_tag }}
          STRATEGY=${{ steps.strategy.outputs.strategy }}

          git add trade-service/k8s/rollouts/canary.yaml \
                  trade-service/k8s/rollouts/bluegreen.yaml

          git diff --staged --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore(deploy): update trade-service image to ${TAG} [${STRATEGY}]

          Triggered by: ${{ github.actor }}
          Commit: ${{ github.sha }}
          Strategy: ${STRATEGY}
          [skip ci]"

          git push origin main

      - name: Summary
        run: |
          echo "### Deployment triggered" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image tag | \`${{ needs.build.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Strategy | \`${{ steps.strategy.outputs.strategy }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ArgoCD app | trade-service |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD will auto-sync within 3 minutes. Monitor rollout:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "kubectl argo rollouts get rollout trade-service-canary -n trade-app -w" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

# ──────────────────────────────────────────────────────────────────────────────
# Separate workflow trigger: manual promote or abort
# ──────────────────────────────────────────────────────────────────────────────
  # This job only runs on workflow_dispatch with explicit action
  rollout-control:
    name: Rollout Control (promote/abort)
    runs-on: ubuntu-latest
    needs: gitops-update
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name github-runners

      - name: Install Argo Rollouts kubectl plugin
        run: |
          curl -sLO https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
          chmod +x kubectl-argo-rollouts-linux-amd64
          sudo mv kubectl-argo-rollouts-linux-amd64 /usr/local/bin/kubectl-argo-rollouts

      - name: Watch rollout status
        run: |
          STRATEGY=${{ github.event.inputs.strategy || 'canary' }}
          ROLLOUT="trade-service-${STRATEGY}"
          echo "Watching rollout: $ROLLOUT"
          kubectl argo rollouts get rollout $ROLLOUT -n trade-app
